<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>heznpc — gallery</title>
  <meta name="description" content="2차 창작 / 유머 일러스트 갤러리">
  <meta property="og:title" content="heznpc — gallery">
  <meta property="og:description" content="2차 창작 / 유머 일러스트 갤러리">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    /* === Light (default) === */
    :root{
      --bg:#faf9f7;
      --header-bg:rgba(250,249,247,.85);
      --header-border:rgba(0,0,0,.05);
      --text:#2c2c2c;
      --text-sec:#999;
      --filter-bg:rgba(0,0,0,.04);
      --filter-hover:rgba(0,0,0,.08);
      --filter-active-bg:rgba(44,44,44,.08);
      --filter-active-text:#2c2c2c;
      --img-radius:6px;
      --img-shadow:0 2px 8px rgba(0,0,0,.06);
      --img-shadow-hover:0 8px 28px rgba(0,0,0,.12);
      --lb-bg:rgba(250,249,247,.96);
      --lb-text:#2c2c2c;
      --lb-text-sec:#999;
      --lb-tag-bg:rgba(0,0,0,.05);
      --empty-text:#bbb;
    }

    /* === Dark === */
    [data-theme="dark"]{
      --bg:#1a1919;
      --header-bg:rgba(26,25,25,.85);
      --header-border:rgba(255,255,255,.05);
      --text:#e8e6e3;
      --text-sec:#777;
      --filter-bg:rgba(255,255,255,.06);
      --filter-hover:rgba(255,255,255,.1);
      --filter-active-bg:rgba(255,255,255,.1);
      --filter-active-text:#e8e6e3;
      --img-radius:6px;
      --img-shadow:0 2px 8px rgba(0,0,0,.2);
      --img-shadow-hover:0 8px 28px rgba(0,0,0,.4);
      --lb-bg:rgba(26,25,25,.97);
      --lb-text:#e8e6e3;
      --lb-text-sec:#777;
      --lb-tag-bg:rgba(255,255,255,.08);
      --empty-text:#555;
    }

    body{
      font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);
      -webkit-font-smoothing:antialiased;line-height:1.6;
      transition:background .35s,color .35s;
    }
    a{color:inherit;text-decoration:none}
    button{font:inherit;cursor:pointer;border:0;background:0 0}

    /* === Header — minimal === */
    .header{
      position:sticky;top:0;z-index:100;
      padding:0 32px;height:52px;
      background:var(--header-bg);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--header-border);
      display:flex;align-items:center;justify-content:space-between;
      transition:background .35s,border-color .35s;
    }
    .header-brand{font-size:.95rem;font-weight:700;letter-spacing:-.02em}
    .header-right{display:flex;align-items:center;gap:20px}
    .header-link{font-size:.75rem;color:var(--text-sec);transition:color .2s}
    .header-link:hover{color:var(--text)}
    .theme-btn{
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.82rem;color:var(--text-sec);transition:all .2s;
    }
    .theme-btn:hover{color:var(--text)}

    /* === Profile === */
    .profile{
      max-width:960px;margin:0 auto;
      padding:32px 32px 0;
      display:flex;align-items:center;gap:16px;
    }
    .profile-avatar{
      width:56px;height:56px;border-radius:50%;
      object-fit:cover;flex-shrink:0;
      box-shadow:var(--img-shadow);
    }
    .profile-text{display:flex;flex-direction:column;gap:2px}
    .profile-name{font-size:.95rem;font-weight:700}
    .profile-bio{font-size:.78rem;color:var(--text-sec);line-height:1.5}
    .profile-links{display:flex;gap:12px;margin-top:4px}
    .profile-links a{
      font-size:.72rem;color:var(--text-sec);
      transition:color .2s;
    }
    .profile-links a:hover{color:var(--text)}

    /* === Filters — understated === */
    .filter-bar{
      max-width:960px;margin:0 auto;
      padding:20px 32px 4px;
      display:flex;gap:6px;flex-wrap:wrap;
    }
    .filter-tag{
      padding:5px 14px;border-radius:9999px;
      font-size:.76rem;font-weight:500;
      background:var(--filter-bg);color:var(--text-sec);
      transition:all .2s;
    }
    .filter-tag:hover{background:var(--filter-hover);color:var(--text)}
    .filter-tag.active{
      background:var(--filter-active-bg);
      color:var(--filter-active-text);font-weight:700;
    }

    /* === Masonry container (JS-powered columns) === */
    .gallery{
      max-width:960px;margin:0 auto;
      padding:16px 32px 100px;
      display:flex;gap:16px;
      align-items:flex-start;
    }
    .gallery-col{
      flex:1;display:flex;flex-direction:column;gap:16px;
    }

    /* === Image item — no card, just art === */
    .item{
      position:relative;cursor:pointer;
      border-radius:var(--img-radius);overflow:hidden;
      box-shadow:var(--img-shadow);
      transition:box-shadow .3s,transform .3s;
      line-height:0;
    }
    .item:hover{
      transform:translateY(-3px);
      box-shadow:var(--img-shadow-hover);
    }
    .item img{
      width:100%;display:block;
      transition:filter .3s;
    }
    .item:hover img{filter:brightness(.92)}

    /* === Lightbox — gallery-style viewer === */
    .lightbox{
      position:fixed;inset:0;z-index:200;
      background:var(--lb-bg);
      display:none;flex-direction:column;
      align-items:center;
      overflow-y:auto;
      transition:background .35s;
    }
    .lightbox.open{display:flex}

    .lb-top{
      width:100%;max-width:720px;
      padding:80px 32px 0;
    }
    .lb-img{
      width:100%;display:block;
      border-radius:var(--img-radius);
      box-shadow:var(--img-shadow);
    }
    .lb-info{
      max-width:720px;width:100%;
      padding:20px 32px 60px;
    }
    .lb-title{font-size:1.05rem;font-weight:700;color:var(--lb-text)}
    .lb-date{font-size:.78rem;color:var(--lb-text-sec);margin-top:4px}
    .lb-desc{font-size:.82rem;color:var(--lb-text-sec);margin-top:10px;line-height:1.7}
    .lb-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .lb-tag{
      font-size:.7rem;padding:3px 10px;border-radius:9999px;
      background:var(--lb-tag-bg);color:var(--lb-text-sec);
    }

    .lb-close{
      position:fixed;top:16px;right:24px;z-index:210;
      width:36px;height:36px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;color:var(--text-sec);
      background:var(--filter-bg);border:none;cursor:pointer;
      transition:all .2s;
    }
    .lb-close:hover{color:var(--text);background:var(--filter-hover)}

    .lb-nav{
      position:fixed;top:50%;transform:translateY(-50%);z-index:210;
      width:40px;height:40px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:1.3rem;color:var(--text-sec);
      background:var(--filter-bg);border:none;cursor:pointer;
      transition:all .2s;
    }
    .lb-nav:hover{color:var(--text);background:var(--filter-hover)}
    .lb-prev{left:16px}
    .lb-next{right:16px}

    /* === Empty state === */
    .empty{
      width:100%;text-align:center;padding:120px 24px;color:var(--empty-text);
    }
    .empty-text{font-size:.88rem;line-height:2}
    .empty code{
      font-size:.8rem;padding:2px 8px;border-radius:6px;
      background:var(--filter-bg);
    }

    /* === Responsive === */
    @media(max-width:640px){
      .header{padding:0 20px}
      .profile{padding:24px 20px 0}
      .profile-avatar{width:48px;height:48px}
      .filter-bar{padding:16px 20px 4px}
      .gallery{padding:12px 20px 80px;gap:10px}
      .gallery-col{gap:10px}
      .item{border-radius:4px}
      .lb-top{padding:64px 16px 0}
      .lb-info{padding:16px 16px 48px}
      .lb-nav{display:none}
    }

    /* === Fade-in === */
    .item{opacity:0;animation:appear .45s ease forwards}
    @keyframes appear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>

  <header class="header">
    <div class="header-brand">gallery</div>
    <div class="header-right">
      <a class="header-link" href="https://heznpc.github.io">heznpc.github.io</a>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <div class="profile">
    <img class="profile-avatar" src="img/avatar.png" alt="avatar">
    <div class="profile-text">
      <div class="profile-name">heznpc</div>
      <div class="profile-bio">2차 창작 / 유머 일러스트</div>
      <div class="profile-links">
        <a href="https://x.com/heznpc" target="_blank" rel="noopener">X</a>
        <a href="https://www.pixiv.net/users/heznpc" target="_blank" rel="noopener">pixiv</a>
      </div>
    </div>
  </div>

  <div class="filter-bar" id="filters">
    <button class="filter-tag active" data-tag="all">전체</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">&times;</button>
    <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
    <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
    <div class="lb-top"><img class="lb-img" id="lbImg" src="" alt=""></div>
    <div class="lb-info">
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-date" id="lbDate"></div>
      <div class="lb-desc" id="lbDesc"></div>
      <div class="lb-tags" id="lbTags"></div>
    </div>
  </div>

  <script>
    // =============================
    // 여기에 그림 데이터 추가
    // =============================
    var WORKS = [
      // {
      //   src: "img/example.png",
      //   title: "제목",
      //   desc: "작업 설명",
      //   tags: ["태그1", "태그2"],
      //   date: "2026-03"
      // },
    ];

    // === State ===
    var gallery = document.getElementById('gallery');
    var filters = document.getElementById('filters');
    var lightbox = document.getElementById('lightbox');
    var lbImgEl = document.getElementById('lbImg');
    var lbTitleEl = document.getElementById('lbTitle');
    var lbDateEl = document.getElementById('lbDate');
    var lbDescEl = document.getElementById('lbDesc');
    var lbTagsEl = document.getElementById('lbTags');
    var currentIdx = -1;
    var filtered = [];

    // === Theme ===
    (function() {
      var root = document.documentElement;
      var btn = document.getElementById('themeToggle');
      function u() { btn.textContent = root.dataset.theme === 'dark' ? '\u2600' : '\u263E'; }
      try { var s = localStorage.getItem('gallery-theme'); if (s) root.dataset.theme = s; } catch(e) {}
      u();
      btn.addEventListener('click', function() {
        root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
        try { localStorage.setItem('gallery-theme', root.dataset.theme); } catch(e) {}
        u();
      });
    })();

    // === Responsive columns ===
    function getCols() {
      return window.innerWidth <= 900 ? 2 : 3;
    }

    // === Tags ===
    var allTags = [];
    WORKS.forEach(function(w) {
      (w.tags || []).forEach(function(t) {
        if (allTags.indexOf(t) === -1) allTags.push(t);
      });
    });
    allTags.forEach(function(tag) {
      var btn = document.createElement('button');
      btn.className = 'filter-tag';
      btn.dataset.tag = tag;
      btn.textContent = tag;
      filters.appendChild(btn);
    });

    var activeTag = 'all';
    filters.addEventListener('click', function(e) {
      if (!e.target.classList.contains('filter-tag')) return;
      document.querySelectorAll('.filter-tag').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
      activeTag = e.target.dataset.tag;
      render();
    });

    // === Render masonry (shortest-column-first, L→R) ===
    function render() {
      filtered = activeTag === 'all'
        ? WORKS.slice()
        : WORKS.filter(function(w) { return (w.tags || []).indexOf(activeTag) !== -1; });

      var cols = getCols();
      gallery.innerHTML = '';

      if (filtered.length === 0) {
        gallery.style.display = 'block';
        var empty = document.createElement('div');
        empty.className = 'empty';
        var emptyText = document.createElement('div');
        emptyText.className = 'empty-text';
        emptyText.innerHTML = '아직 작품이 없습니다<br><code>WORKS</code> 배열에 이미지를 추가하세요';
        empty.appendChild(emptyText);
        gallery.appendChild(empty);
        return;
      }

      gallery.style.display = 'flex';

      // Create column elements
      var colEls = [];
      var colH = [];
      for (var c = 0; c < cols; c++) {
        var col = document.createElement('div');
        col.className = 'gallery-col';
        gallery.appendChild(col);
        colEls.push(col);
        colH.push(0);
      }

      // Distribute items to shortest column
      filtered.forEach(function(w, i) {
        // Find shortest column
        var minIdx = 0;
        for (var c = 1; c < cols; c++) {
          if (colH[c] < colH[minIdx]) minIdx = c;
        }

        var item = document.createElement('div');
        item.className = 'item';
        item.style.animationDelay = (i * 40) + 'ms';
        var img = document.createElement('img');
        img.setAttribute('src', w.src);
        img.setAttribute('alt', w.title || '');
        img.setAttribute('loading', 'lazy');
        item.appendChild(img);
        item.addEventListener('click', (function(idx) {
          return function() { openLB(idx); };
        })(i));

        colEls[minIdx].appendChild(item);
        // Estimate height (will be refined when image loads, but rough is fine)
        colH[minIdx] += 300;

        // Refine height on load
        img.addEventListener('load', (function(ci, el) {
          return function() {
            colH[ci] += this.naturalHeight / this.naturalWidth * el.offsetWidth - 300;
          };
        })(minIdx, item));
      });
    }

    // === Lightbox ===
    function openLB(idx) {
      currentIdx = idx;
      showLB();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function showLB() {
      var w = filtered[currentIdx];
      lbImgEl.src = w.src;
      lbTitleEl.textContent = w.title || '';
      lbDateEl.textContent = w.date || '';
      lbDescEl.textContent = w.desc || '';
      lbDescEl.style.display = w.desc ? '' : 'none';
      lbTagsEl.innerHTML = '';
      (w.tags || []).forEach(function(t) {
        var span = document.createElement('span');
        span.className = 'lb-tag';
        span.textContent = t;
        lbTagsEl.appendChild(span);
      });
      lightbox.scrollTop = 0;
      var globalIdx = WORKS.indexOf(w);
      history.replaceState(null, '', '#work-' + globalIdx);
    }

    function closeLB() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      currentIdx = -1;
      history.replaceState(null, '', location.pathname);
    }

    function nav(dir) {
      if (currentIdx < 0 || filtered.length === 0) return;
      currentIdx = (currentIdx + dir + filtered.length) % filtered.length;
      showLB();
    }

    document.getElementById('lbClose').addEventListener('click', closeLB);
    document.getElementById('lbPrev').addEventListener('click', function(e) { e.stopPropagation(); nav(-1); });
    document.getElementById('lbNext').addEventListener('click', function(e) { e.stopPropagation(); nav(1); });
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLB();
    });
    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') nav(-1);
      if (e.key === 'ArrowRight') nav(1);
    });

    render();

    (function() {
      var m = location.hash.match(/^#work-(\d+)$/);
      if (m) {
        var idx = parseInt(m[1], 10);
        if (idx >= 0 && idx < WORKS.length) {
          var fIdx = filtered.indexOf(WORKS[idx]);
          if (fIdx !== -1) openLB(fIdx);
        }
      }
    })();

    var resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(render, 200);
    });
  </script>
</body>
</html>
